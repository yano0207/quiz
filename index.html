<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズポータルサイト</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f0f2f5; color: #333; text-align: center; }
        .card { background: white; max-width: 500px; margin: 30px auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .category-box { border: 2px solid #007bff; border-radius: 10px; padding: 15px; margin: 20px 0; background: #f8fbff; }
        h1 { color: #007bff; font-size: 24px; }
        h2 { margin-top: 0; }
        button { font-size: 16px; padding: 10px 15px; margin: 5px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; width: 80%; max-width: 250px; }
        .start-btn { background: #28a745; color: white; }
        .start-btn:hover { background: #218838; }
        .rank-btn { background: #17a2b8; color: white; }
        .rank-btn:hover { background: #138496; }
    </style>
</head>
<body>
    <div class="card">
        <h1>四択クイズ一覧</h1>
        <p>挑戦したいクイズのタイトルを選んでください。</p>

        <div class="category-box">
            <h2>金属(1)</h2>
            <button class="start-btn" onclick="location.href='quiz1.html'">問題を始める</button><br>
            <button class="rank-btn" onclick="window.open('ranking.html?cat=quiz1', '_blank')">ランキングを見る</button>
        </div>

        <div class="category-box">
            <h2>金属(2)</h2>
            <button class="start-btn" onclick="location.href='quiz2.html'">問題を始める</button><br>
            <button class="rank-btn" onclick="window.open('ranking.html?cat=quiz2', '_blank')">ランキングを見る</button>
        </div>
    </div>
</body>
</html>
