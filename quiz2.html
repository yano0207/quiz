<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズランキング</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f0f2f5; color: #333; text-align: center; }
        .card { background: white; max-width: 500px; margin: 30px auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .top3 { font-weight: bold; color: #ff9900; }
        button { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="card">
        <h2 id="ranking-title">🏆 ランキング</h2>
        <p>同じ点数の場合、タイムが短い人が上位になります。</p>
        <button onclick="loadRanking()">🔄 順位を更新する</button>
        
        <table>
            <thead>
                <tr>
                    <th>順位</th>
                    <th>名前</th>
                    <th>スコア</th>
                    <th>タイム</th>
                </tr>
            </thead>
            <tbody id="ranking-table-body">
                <tr><td colspan="4">読み込み中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // 1. URLの末尾から /rest/v1/ を削除してクイズ画面と統一しました
        const supabaseUrl = 'https://yxrxolblpkcxkvndxcax.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4cnhvbGJscGtjeGt2bmR4Y2F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNjM4MTAsImV4cCI6MjA5NzYzOTgxMH0.TjuBWCuo2U5LwoqCxo2kAf3ouVsw634BsEzSc-SQcQs';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // ★ URLの「?cat=◯◯」からクイズ名を取得する処理を追加
        const urlParams = new URLSearchParams(window.location.search);
        const currentCategory = urlParams.get('cat') || 'quiz2'; // 何もなければデフォルトでquiz2

        // ★ 画面に表示するクイズのタイトルを設定（今後クイズが増えたらここに追加できます）
        const categoryNames = {
            quiz2: "金属(2)"
        };
        const titleText = categoryNames[currentCategory] || currentCategory;
        document.getElementById('ranking-title').innerText = "🏆 " + titleText + " ランキング";

        // ★ 読み込むテーブル名を作成（例： 'rankings_' + 'quiz2' = 'rankings_quiz2'）
        const tableName = 'rankings_' + currentCategory;

        async function loadRanking() {
            const tbody = document.getElementById("ranking-table-body");
            try {
                // 固定の 'rankings' ではなく、自動判定した tableName からデータを取得します
                const { data, error } = await supabase
                    .from(tableName)
                    .select('*')
                    .order('score', { ascending: false })
                    .order('time', { ascending: true });
                
                if(error) throw error;

                tbody.innerHTML = "";
                if(!data || data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4'>まだデータがありません</td></tr>";
                    return;
                }

                data.forEach((user, index) => {
                    const tr = document.createElement("tr");
                    let rank = index + 1;
                    let rankClass = rank <= 3 ? "class='top3'" : "";
                    
                    // タイムを小数第一位までに揃えて表示
                    const displayTime = Number(user.time).toFixed(1);
                    
                    tr.innerHTML = `
                        <td ${rankClass}>${rank}位</td>
                        <td>${user.name}</td>
                        <td style="font-weight:bold; color:#007bff;">${user.score}点</td>
                        <td>${displayTime}秒</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                tbody.innerHTML = "<tr><td colspan='4' style='color:red;'>データの取得に失敗しました</td></tr>";
                console.error(err);
            }
        }
        
        loadRanking();
    </script>
</body>
</html>
